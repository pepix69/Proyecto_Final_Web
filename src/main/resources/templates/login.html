<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
          href="/adminlte/dist/css/adminlte.min.css">

</head>

<body class="login-page">

<div class="login-box">

    <div class="card">

        <div class="card-body login-card-body">

            <p class="login-box-msg">

                Iniciar Sesión

            </p>

            <div class="form-group">

                <input type="email"
                       id="correo"
                       class="form-control"
                       placeholder="Correo">

            </div>

            <div class="form-group">

                <input type="password"
                       id="password"
                       class="form-control"
                       placeholder="Contraseña">

            </div>

            <button id="btnLogin"
                    class="btn btn-primary btn-block">

                Ingresar

            </button>

        </div>

    </div>

</div>

<script src="/adminlte/plugins/jquery/jquery.min.js"></script>

<script src="/js/login.js"></script>

</body>

</html>
